{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Выходные из Москвы{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a class="logo" href="/">Выходные из Москвы</a>

            <nav class="nav">
                <a href="/">Главная</a>
                <a href="/destinations/">Направления</a>
                <a href="/routes/">Маршруты</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div>
                <p class="footer-title">Выходные из Москвы</p>
                <p class="footer-text">Маршруты на 1–3 дня: куда поехать, как добраться и что посмотреть.</p>
            </div>

            <div>
                <p class="footer-title">Навигация</p>
                <p class="footer-text"><a href="/">Главная</a></p>
                <p class="footer-text"><a href="/destinations/">Направления</a></p>
                <p class="footer-text"><a href="/routes/">Маршруты</a></p>
            </div>
        </div>
    </footer>
</body>
</html>
